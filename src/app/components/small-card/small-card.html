<div class="container__small-card">
    <a [routerLink]="['content', Id]" class="small-card__link">
        <img
            [src]="smallCardImg"
            alt="" class="small-card__img">
        <div class="small-card__description">
            <span [textContent]="title" class="author"></span>
            <p [textContent]="description" class="description"></p>
        </div>
    </a>
</div>
