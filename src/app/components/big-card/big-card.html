<div class="container__big-card">
    <a [routerLink]="['content', Id]" 
        class="big-card__link">
        <img 
            [src]="cardImage" 
            alt="" class="big-card__picture">
        <h2 
            [textContent]="cardTitle" 
            class="big-card__title">
        </h2>
        <p 
            [textContent]="cardNews" 
            class="big-card__text">
        </p>
    </a>
</div>
